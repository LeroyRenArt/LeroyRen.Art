<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeroyRen.art – Portalen</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #f5f0e6;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      text-align: center;
    }

    img.hero {
      width: 90%;
      max-width: 1000px;
      margin-top: 3rem;
      border-radius: 12px;
      box-shadow: 0 0 32px rgba(255, 215, 0, 0.2);
    }

    h1 {
      font-size: 2.8rem;
      margin-top: 2rem;
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
    }

    p {
      font-size: 1.1rem;
      max-width: 600px;
      margin: 1.5rem auto;
      line-height: 1.6;
      opacity: 0.95;
    }

    a.link {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.9rem 1.4rem;
      background: #1a1a1a;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid #444;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.15);
      transition: all 0.3s ease;
    }

    a.link:hover {
      background: #333;
      transform: scale(1.05);
    }

    footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
