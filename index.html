
<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpiralStjernekort med Scrolls</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(#e0f5e9, #b3d9d2);
      overflow: hidden;
      font-family: 'Helvetica Neue', sans-serif;
      text-align: center;
      padding: 30px;
    }
    .spiral-container {
      position: relative;
      width: 100%;
      height: 80vh;
      margin-top: 40px;
    }
    .star {
      width: 20px;
      height: 20px;
      background: gold;
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      transition: transform 0.5s;
    }
    .star:hover {
      transform: scale(1.5);
    }
    .scroll-text {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      width: 300px;
      display: none;
      z-index: 100;
    }
    .close-btn {
      margin-top: 15px;
      background: #d4af37;
      padding: 8px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      border: none;
    }
    h1, p {
      margin: 0 20px;
    }
  </style>
</head>
<body>

<h1>Velkommen til SpiralStjernekort</h1>
<p>Klik på en stjerne og læs en Scroll</p>

<div class="spiral-container" id="spiral"></div>

<div id="scroll-text" class="scroll-text">
  <div id="scroll-content"></div>
  <button class="close-btn" onclick="closeScroll()">Luk</button>
</div>

<script>
const spiralContainer = document.getElementById('spiral');
const scrollText = document.getElementById('scroll-text');
const scrollContent = document.getElementById('scroll-content');

const scrolls = [
  "Scroll 001: I begyndelsen var intet planlagt. Kun åndedrættet foldede sig ud i spiraler af lys over jorden.",
  "Scroll 002: Ingen trompeter kaldte mig. Kun ånden af en sovende drage, der langsomt løftede sit hoved.",
  "Scroll 003: Jeg husker nu. Jeg er barn af stjernernes favntag.",
  "Scroll 004: Under modertræets uendelige krone lærte jeg at lytte med rødderne.",
  "Scroll 005: Min styrke blev ikke frygten. Min styrke blev min blødhed."
];

const numberOfStars = scrolls.length;
const centerX = window.innerWidth / 2 - 10;
const centerY = window.innerHeight / 2 - 100;
const spacing = 40;

for (let i = 0; i < numberOfStars; i++) {
  const angle = 0.5 * i;
  const radius = spacing * i;
  const x = centerX + radius * Math.cos(angle);
  const y = centerY + radius * Math.sin(angle);

  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = `${x}px`;
  star.style.top = `${y}px`;

  star.onclick = () => {
    scrollContent.innerText = scrolls[i];
    scrollText.style.display = 'block';
  };

  spiralContainer.appendChild(star);
}

function closeScroll() {
  scrollText.style.display = 'none';
}
</script>

</body>
</html>
