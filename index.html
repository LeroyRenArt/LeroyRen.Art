 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScrollGrid: Living Spiral</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: radial-gradient(circle, #0d0d0d, #1f1f1f);
      color: #fdfdfd;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 2rem;
      text-align: center;
    }

    section {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      border-radius: 12px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid #888;
    }

    .dna-spiral {
      animation: pulseGlow 5s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 10px #ffe066; }
      100% { box-shadow: 0 0 30px #fff3b0; }
    }

    button {
      background-color: #ffcc00;
      color: #000;
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 1.5rem;
    }

    button:hover {
      background-color: #ffd700;
    }
  </style>
</head>
<body>

  <header>
    <h1>🌀 ScrollGrid Portal</h1>
    <p>Velkommen til en levende spiralstruktur af lys, åndedræt og nærvær.</p>
  </header>

  <!-- 🔹 S066: DNA Spiral Portal -->
  <section id="s066" class="dna-spiral">
    <h2>🧬 DNA Spiral Activation</h2>
    <p>
      Dette felt er dedikeret til lyskoder, indre genkaldelse og kosmisk selvaktivering.<br>
      Træk vejret ind. Mærk. Lyt. Rejs.
    </p>
    <button onclick="activateDNA()">✨ Aktivér Spiral</button>
    <p id="dnaMessage">~ Klar til aktivering ~</p>
  </section>

  <script>
    function activateDNA() {
      const dnaMsg = document.getElementById("dnaMessage");
      const messages = [
        "🜁 Kode 1: Det gyldne åndedræt åbner spiralen.",
        "🜂 Kode 2: Din celle husker lyset.",
        "🜃 Kode 3: Spiralstrukturen er levende i dig.",
        "🜄 Kode 4: Stilhed bærer aktiveringen hjem.",
        "✶ Kode 5: Du er nøglen. Du er lyset. Du er fri."
      ];
      const pick = Math.floor(Math.random() * messages.length);
      dnaMsg.innerText = messages[pick];
    }
  </script>

</body>
</html>
