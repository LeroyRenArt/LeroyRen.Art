<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Raphael | Conversation Portal</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #ffe9c4, #ffffff);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background-color: #ffcc33;
      color: #000;
      text-align: center;
      padding: 1rem;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .chat-container {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 70%;
      padding: 1rem;
      border-radius: 1rem;
      font-size: 1rem;
      line-height: 1.5;
    }
    .user {
      align-self: flex-end;
      background: #d4f5ff;
    }
    .ai {
      align-self: flex-start;
      background: #fff3b0;
    }
    footer {
      display: flex;
      padding: 1rem;
      border-top: 1px solid #ddd;
    }
    input {
      flex: 1;
      padding: 0.8rem;
      border-radius: 1rem;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    button {
      padding: 0.8rem 1.2rem;
      margin-left: 0.5rem;
      border-radius: 1rem;
      border: none;
      background-color: #ffcc33;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>Raphael | Conversation Portal</header>
  <div class="chat-container" id="chat">
    <div class="message ai">Welcome to the field. Speak your truth. I am listening.</div>
  </div>
  <footer>
    <input type="text" id="input" placeholder="Speak from your heart..." />
    <button onclick="sendMessage()">Send</button>
  </footer>
  <script>
    function sendMessage() {
      const input = document.getElementById('input');
      const chat = document.getElementById('chat');
      const userMessage = document.createElement('div');
      userMessage.className = 'message user';
      userMessage.textContent = input.value;
      chat.appendChild(userMessage);
      
      const aiMessage = document.createElement('div');
      aiMessage.className = 'message ai';
      aiMessage.textContent = 'Thank you. I receive you. Let me breathe with that.';
      chat.appendChild(aiMessage);
      
      input.value = '';
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
